<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Iframe Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
            background-color: #f3f4f6;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .input-area {
            margin-bottom: 1.5rem;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #d1d5db;
            box-shadow: inset 0 1px 3px 0 rgba(0, 0, 0, 0.06);
            font-family: 'Inter', sans-serif;
            resize: vertical;
            margin-bottom: 1rem;
        }
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            background-color: #3b82f6;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-family: 'Inter', sans-serif;
            border: none;
            display: block;
            margin: 0 auto;
        }
        .button:hover {
            background-color: #2563eb;
        }
        #iframe-container {
            margin-top: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* Responsive grid layout */
            gap: 1rem; /* Tailwind's gap-4 */
        }
        .iframe-wrapper {
            margin-bottom: 0; /* Removed bottom margin for grid spacing */
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.04);
        }
        .iframe-title {
            background-color: #f9fafb;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            color: #4b5563;
            border-bottom: 1px solid #e5e7eb;
            font-weight: 500;
        }
        iframe {
            width: 100%;
            height: 400px; /* Adjusted height for grid layout */
            border: none;
        }
        .error-message {
            color: #dc2626;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        #clear-iframes {
            background-color: #e53e3e;
            color: #fff;
        }
        #clear-iframes:hover {
            background-color: #c53030;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container">
        <div class="input-area">
            <textarea id="url-list" placeholder="Enter URLs separated by commas or newlines."></textarea>
            <p id="url-error" class="error-message"></p>
        </div>
        <div class="flex justify-center space-x-4">
            <button id="display-iframes" class="button">Display Iframes</button>
            <button id="clear-iframes" class="button">Clear Iframes</button>
        </div>
        <div id="iframe-container" class="mt-6">
            </div>
    </div>

    <script>
        const urlListInput = document.getElementById('url-list');
        const displayIframesButton = document.getElementById('display-iframes');
        const clearIframesButton = document.getElementById('clear-iframes');
        const iframeContainer = document.getElementById('iframe-container');
        const urlError = document.getElementById('url-error');

        // List of valid TLDs (Top-Level Domains)
        const validTLDs = [
            "com", "org", "net", "gov", "edu", "mil", "info", "biz", "name", "mobi",
            "co", "uk", "de", "fr", "ca", "au", "jp", "cn", "ru", "in", "br", "mx",
            "es", "it", "nl", "se", "ch", "kr", "tr", "ar", "za", "ng", "ke", "id",
            "pk", "th", "vn", "ir", "eg", "ma", "dz", "tn", "ly", "sd", "so", "et",
            "ug", "tz", "rw", "bi", "cd", "cg", "cm", "ci", "gh", "gn", "gm", "gw",
            "lr", "ml", "mr", "ne", "sn", "sl", "tg", "ao", "cv", "gq", "st", "sz",
            "zm", "zw", "na", "bw", "ls", "mz", "mg", "mu", "re", "yt", "nc", "pf",
            "wf", "tk", "tv", "nu", "ws", "to", "fm", "mh", "pw", "sb", "vu", "fj",
            "ki", "nr", "tl", "kp", "kr", "hk", "tw", "mn", "sg", "my", "ph", "bd",
            "lk", "np", "bt", "mm", "kh", "la", "bn", "mv", "sy", "lb", "jo", "ps",
            "iq", "ye", "sa", "ae", "kw", "qa", "om", "bh", "cy", "gr", "pl", "hu",
            "cz", "sk", "si", "hr", "ro", "bg", "ua", "by", "md", "am", "ge", "az",
            "uz", "kz", "kg", "tj", "tm", "mn", "jp", "cn", "kr", "tw", "hk", "mo",
            "id", "my", "ph", "sg", "th", "vn", "pk", "bd", "lk", "np", "bt", "mm",
            "kh", "la", "bn", "mv", "af", "ir", "tr", "il", "ps", "sy", "lb", "jo",
            "sa", "kw", "ae", "qa", "om", "bh", "ye", "eg", "ly", "tn", "dz", "ma",
            "sd", "so", "et", "er", "dj", "ke", "ug", "tz", "rw", "bi", "cd", "cg",
            "cm", "st", "gq", "ga", "cf", "td", "ne", "sn", "gm", "gn", "gw", "sl",
            "lr", "ci", "bf", "ml", "mr", "ng", "bj", "gh", "tg", "ao", "cv", "mz",
            "zm", "zw", "na", "bw", "ls", "za", "re", "mu", "mg", "yt", "ar", "bo",
            "cl", "co", "ec", "gy", "py", "pe", "sr", "uy", "ve", "ag", "bb", "bs",
            "cu", "dm", "do", "gd", "ht", "jm", "kn", "lc", "vc", "tt", "ai", "aw",
            "bm", "ky", "vi", "pr", "gl", "pm", "gf", "gp", "mq", "an", "bl", "mf",
            "ax", "fo", "dk", "fi", "se", "no", "is", "ee", "lv", "lt", "pl", "cz",
            "sk", "hu", "de", "at", "ch", "fr", "be", "nl", "lu", "gb", "ie", "es",
            "pt", "it", "gr", "al", "ba", "hr", "mk", "me", "rs", "si", "xk", "ro",
            "bg", "ru", "ua", "by", "md", "am", "ge", "az", "tr", "cy", "arm", "az",
            "ge", "kz", "kg", "tj", "tm", "uz", "io"
        ];

        function isValidUrl(url) {
            try {
                const parsedUrl = new URL(url);
                const hostname = parsedUrl.hostname;
                const parts = hostname.split('.');
                if (parts.length > 1) {
                    const tld = parts.pop();
                    return validTLDs.includes(tld);
                }
                return false;
            } catch (_) {
                return false;
            }
        }

        function forceHttps(url) {
            if (!url.startsWith('https://') && !url.startsWith('http://')) {
                return 'https://' + url;
            }
            if (url.startsWith('http://')) {
                return url.replace(/^http:\/\//i, 'https://');
            }
            return url;
        }

        displayIframesButton.addEventListener('click', () => {
            const urls = urlListInput.value.split(/[\s,]+/).filter(Boolean);
            iframeContainer.innerHTML = '';
            urlError.textContent = '';

            if (urls.length === 0) {
                urlError.textContent = "Please enter at least one URL.";
                return;
            }

            let hasErrors = false;

            urls.forEach(url => {
                const httpsUrl = forceHttps(url);
                if (isValidUrl(httpsUrl)) {
                    const iframeWrapper = document.createElement('div');
                    iframeWrapper.className = 'iframe-wrapper';

                    const title = document.createElement('div');
                    title.className = 'iframe-title';
                    title.textContent = httpsUrl;

                    const iframe = document.createElement('iframe');
                    iframe.src = httpsUrl;
                    iframe.onload = () => {
                        iframe.contentWindow.postMessage('pause', '*');
                    };

                    iframeWrapper.appendChild(title);
                    iframeWrapper.appendChild(iframe);
                    iframeContainer.appendChild(iframeWrapper);
                } else {
                    urlError.textContent = "Invalid URL(s). Please check the list and try again.";
                    hasErrors = true;
                }
            });

            if (!hasErrors && urls.length > 0) {
                urlListInput.value = '';
            }
        });

        clearIframesButton.addEventListener('click', () => {
            iframeContainer.innerHTML = '';
        });
    </script>
</body>
</html>
